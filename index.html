<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد سنان القانوني</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        header { background: #1a237e; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; margin-bottom: 15px; box-sizing: border-box; outline: none; text-align: center; }
        button { background: #1a237e; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; width: 100%; font-size: 16px; }
        #res { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: right; line-height: 1.6; color: #333; min-height: 50px; border-right: 5px solid #1a237e; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <header>مساعد سنان القانوني</header>
        <input type="text" id="q" placeholder="اسأل عن أي مادة قانونية...">
        <button id="btn" onclick="ask()">إرسال السؤال</button>
        <div id="res">الإجابة ستظهر هنا...</div>
    </div>

    <script>
        async function ask() {
            const q = document.getElementById('q').value;
            const res = document.getElementById('res');
            const btn = document.getElementById('btn');
            if(!q) return;

            btn.disabled = true;
            res.innerText = "جاري البحث في القانون السوري...";
            
            try {
                // تأكد من وضع مفتاح الـ API الخاص بك هنا
                const key = "AIzaSyAKPf6JrSgkbrdSA7yt_5WmdbKPE5Xy7SE"; 
                
                // استخدام الموديل المستقر gemini-pro مع نسخة الرابط v1
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "أنت مساعد قانوني سوري خبير. أجب بدقة وتفصيل على السؤال التالي: " + q }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    res.innerText = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    res.innerText = "خطأ من جوجل: " + data.error.message;
                } else {
                    res.innerText = "لم يتم العثور على إجابة، حاول صياغة السؤال بشكل مختلف.";
                }
            } catch (e) {
                res.innerText = "فشل في الاتصال. تأكد من الإنترنت وحاول مرة أخرى.";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
