<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد سنان القانوني</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a237e; color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-start; background: #e3f2fd; color: #0d47a1; }
        .bot { align-self: flex-end; background: white; border: 1px solid #ddd; }
        footer { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { background: #1a237e; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <header>مساعد سنان القانوني</header>
    <div id="chat-box">
        <div class="msg bot">مرحباً بك، اسألني عن أي مادة في قانون العقوبات السوري.</div>
    </div>
    <footer>
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
        <button onclick="send()">إرسال</button>
    </footer>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const userMsg = input.value;
            box.innerHTML += `<div class="msg user">${userMsg}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                // تعديل طريقة الإرسال لتناسب FastAPI
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'message': userMsg })
                });
                
                const data = await response.json();
                box.innerHTML += `<div class="msg bot">${data.answer}</div>`;
            } catch (error) {
                box.innerHTML += `<div class="msg bot">حدث خطأ في الاتصال بالسيرفر.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
