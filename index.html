<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد سنان القانوني</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header { background: #1a237e; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; border: 1px solid #ccc; border-radius: 25px; margin-bottom: 10px; }
        button { background: #1a237e; color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; }
        #response { margin-top: 20px; text-align: right; padding: 10px; background: #e8eaf6; border-radius: 10px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <header>مساعد سنان القانوني</header>
        <input type="text" id="ask" placeholder="اسأل عن أي مادة قانونية...">
        <button onclick="talk()">إرسال</button>
        <div id="response">الإجابة ستظهر هنا...</div>
    </div>

    <script>
        async function talk() {
            const btn = document.querySelector('button');
            const resDiv = document.getElementById('response');
            const question = document.getElementById('ask').value;
            if(!question) return;

            btn.innerText = "جاري البحث...";
            resDiv.innerText = "أقوم بمراجعة القانون السوري الآن...";

            try {
                const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIza...", {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: "أنت محامي سوري خبير، أجب عن هذا السؤال بدقة: " + question }] }] })
                });
                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resDiv.innerText = "AIzaSyA3UCMRUohujRGRvVxFBDsNd_CkjiXvcNg";
            }
            btn.innerText = "إرسال";
        }
    </script>
</body>
</html>
